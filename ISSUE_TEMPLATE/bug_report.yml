name: Bug report
description: Report a reproducible defect in a CAVISE repository
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please provide enough information for maintainers to reproduce, triage, and validate the issue.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which repository or component is affected?
      options:
        - CAVISE
        - OpenCDA
        - Artery
        - Scenario Manager
        - Pipelines
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version, branch, or commit
      description: Which version, branch, tag, or commit is affected?
      placeholder: "main / v1.0.0 / commit SHA"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide relevant runtime and simulator details.
      placeholder: |
        OS:
        Python:
        Docker:
        GPU / CUDA:
        SUMO:
        CARLA:
        OpenCDA:
        OMNeT++:
        Artery:
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproducible scenario.
      placeholder: |
        1. Clone ...
        2. Configure ...
        3. Run ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "Describe what should have happened."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "Describe what actually happened."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, stack traces, or screenshots
      description: Paste relevant logs or attach screenshots.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues before opening this one.
          required: true
        - label: I can reproduce this on the latest available version or commit.
          required: false
        - label: I included relevant logs, configuration, or screenshots.
          required: false