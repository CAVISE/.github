name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose new capabilities, improvements, or research features.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve?
      placeholder: "Describe the limitation, missing capability, or research need."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or capability.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Simulation
        - Scenario management
        - V2X communication
        - Cooperative perception
        - Cooperative driving automation
        - Automotive cybersecurity
        - CI/CD
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Describe alternative approaches, tools, or workarounds.

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Optional. Add references, papers, diagrams, screenshots, or related issues.